<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>Santidade · Diário</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <div>
          <h1>Santidade</h1>
          <p id="streakInfo" class="streak">—</p>
        </div>
      </div>
      <div class="month-nav">
        <button id="prevMonth" class="nav-btn" aria-label="Mês anterior">‹</button>
        <span id="monthLabel" class="month-label">—</span>
        <button id="nextMonth" class="nav-btn" aria-label="Próximo mês">›</button>
      </div>
    </header>

    <div class="weekdays">
      <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
    </div>
    <main id="calendar" class="calendar"></main>

    <p class="hint">Toque em um dia para registrar. Verde = tudo feito · Ponto dourado = registro parcial.</p>

    <section class="books">
      <div class="books-head">
        <h2>📕 Livros terminados</h2>
        <span id="booksCount" class="books-count">0</span>
      </div>
      <div class="book-add">
        <input id="bookInput" type="text" placeholder="Nome do livro que terminei..." autocomplete="off" />
        <button id="bookAdd" class="btn primary">Adicionar</button>
      </div>
      <ul id="booksList" class="books-list"></ul>
    </section>

    <footer class="backup">
      <button id="exportBtn" class="btn ghost small">⬇ Exportar backup</button>
      <button id="importBtn" class="btn ghost small">⬆ Importar backup</button>
      <input id="importFile" type="file" accept=".json,application/json" hidden />
    </footer>
  </div>

  <!-- Painel do dia -->
  <div id="sheetBackdrop" class="sheet-backdrop" hidden>
    <section id="sheet" class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h2 id="sheetDate">—</h2>
        <button id="closeSheet" class="close-btn" aria-label="Fechar">✕</button>
      </div>
      <div id="habitsList" class="habits"></div>
      <div class="sheet-actions">
        <button id="clearDay" class="btn ghost">Limpar dia</button>
        <button id="saveDay" class="btn primary">Salvar</button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
